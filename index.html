<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI社員パック チーム版 ― デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green-darkest:#0c3a1d;
  --green-dark:#14512a;
  --green:#1f6b3a;
  --green-bright:#2c8f4d;
  --green-soft:#e8f1ea;
  --green-soft2:#f3f7f3;
  --amber:#d08e1f;
  --amber-deep:#a96a10;
  --amber-soft:#faf0d9;
  --ink:#1c2329;
  --ink-soft:#3a444b;
  --muted:#6e7872;
  --muted-soft:#9aa49d;
  --bg:#eef2ee;
  --bg-grad-a:#f1f4ef;
  --bg-grad-b:#e9efe9;
  --line:#e3e9e1;
  --line-soft:#eef2ec;
  --warn:#bb4631;
  --warn-soft:#faeae4;
  --blue:#2c6493;
  --blue-soft:#e8eff6;
  /* オプション(option-only)アクセント＝琥珀を深めた上品な金茶。緑との差別化用、紫青は不使用 */
  --opt:#b07b16;
  --opt-deep:#8a5e0c;
  --opt-soft:#fbf3df;
  --opt-soft2:#fdf8ed;
  --opt-line:#ecd9a8;
  --card:#ffffff;
  --shadow-xs:0 1px 2px rgba(18,42,24,.05), 0 1px 1px rgba(18,42,24,.04);
  --shadow-sm:0 1px 2px rgba(18,42,24,.06), 0 4px 12px rgba(18,42,24,.06);
  --shadow-md:0 1px 2px rgba(18,42,24,.06), 0 10px 26px rgba(18,42,24,.10);
  --shadow-lg:0 2px 4px rgba(18,42,24,.07), 0 20px 48px rgba(18,42,24,.15);
  --radius-sm:11px;
  --radius:15px;
  --radius-lg:18px;
  --sb-w:262px;
  --ease:cubic-bezier(.22,.85,.3,1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Noto Sans JP",system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1300px 540px at 84% -12%, rgba(31,107,58,.06), transparent 62%),
    radial-gradient(900px 460px at 6% 4%, rgba(208,142,31,.05), transparent 58%),
    linear-gradient(180deg,var(--bg-grad-a),var(--bg-grad-b));
  background-attachment:fixed;
  line-height:1.64;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:.004em;
}
h1,h2,h3,h4{margin:0;font-weight:700;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;}
table{border-collapse:collapse;width:100%;}
svg{display:block;}
::selection{background:rgba(31,107,58,.18);}

/* scrollbar polish */
.sb-nav::-webkit-scrollbar,.chat-log::-webkit-scrollbar,.tbl-scroll::-webkit-scrollbar{width:9px;height:9px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
.sb-nav::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22);background-clip:padding-box;}
.chat-log::-webkit-scrollbar-thumb,.tbl-scroll::-webkit-scrollbar-thumb{background:#d6ded6;border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
.chat-log::-webkit-scrollbar-thumb:hover,.tbl-scroll::-webkit-scrollbar-thumb:hover{background:#c5cec5;background-clip:padding-box;}

/* ---------- demo strip ---------- */
.demo-strip{
  position:fixed;top:0;left:0;right:0;height:36px;z-index:60;
  background:linear-gradient(90deg,#172013,#28301f 52%,#172013);
  color:#f0e6cd;display:flex;align-items:center;justify-content:center;
  font-size:12px;letter-spacing:.05em;gap:10px;font-weight:500;
  border-bottom:1px solid rgba(255,255,255,.06);
  box-shadow:0 1px 0 rgba(0,0,0,.18);
}
.demo-strip .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 3px rgba(208,142,31,.24);animation:pulse 2.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(208,142,31,.24);}50%{box-shadow:0 0 0 6px rgba(208,142,31,.04);}}

/* ---------- layout ---------- */
.app{display:flex;min-height:100vh;padding-top:36px;}
.sidebar{
  width:var(--sb-w);flex:0 0 var(--sb-w);
  background:
    radial-gradient(420px 220px at 20% 0%, rgba(255,255,255,.05), transparent 70%),
    linear-gradient(186deg,var(--green-darkest),var(--green-dark) 64%,#0e421f);
  color:#dde9e0;
  position:fixed;top:36px;bottom:0;left:0;
  display:flex;flex-direction:column;
  z-index:50;
  box-shadow:1px 0 0 rgba(255,255,255,.05), 8px 0 32px rgba(12,38,22,.14);
}
.sb-brand{padding:24px 22px 18px;display:flex;align-items:center;gap:13px;}
.sb-logo{
  width:42px;height:42px;border-radius:13px;flex:0 0 42px;
  background:linear-gradient(150deg,var(--green-bright),var(--green));
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28), inset 0 0 0 1px rgba(255,255,255,.06), 0 6px 16px rgba(10,34,20,.45);
}
.sb-brand .nm{font-size:15.5px;font-weight:700;color:#fff;line-height:1.28;letter-spacing:.012em;}
.sb-brand .nm small{display:block;font-family:"Oswald",sans-serif;font-size:9.5px;font-weight:500;color:#9cc1aa;letter-spacing:.22em;margin-top:3px;text-transform:uppercase;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 14px 18px;}
.nav-sec{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.22em;color:#7aa789;padding:18px 12px 9px;font-weight:500;text-transform:uppercase;display:flex;align-items:center;gap:9px;}
.nav-sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.10),transparent);}
.nav-sec.opt{color:#e6c478;margin-top:6px;}
.nav-sec.opt::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px rgba(208,142,31,.6);}
.nav-sec.opt::after{background:linear-gradient(90deg,rgba(208,142,31,.30),transparent);}
.nav-item{
  display:flex;align-items:center;gap:13px;
  padding:11px 14px;border-radius:12px;margin-bottom:3px;
  color:#c5d9cb;font-size:13.5px;font-weight:500;
  position:relative;transition:background .2s var(--ease),color .2s var(--ease),transform .14s var(--ease);
  width:100%;text-align:left;
}
.nav-item .ic{width:20px;height:20px;flex:0 0 20px;opacity:.78;transition:opacity .2s,transform .2s var(--ease);}
.nav-item .ni-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item:hover .ic{opacity:1;transform:translateX(1px);}
.nav-item:active{transform:scale(.984);}
.nav-item:focus-visible{outline:2px solid var(--amber);outline-offset:-2px;}
.nav-item.active{background:linear-gradient(90deg,rgba(255,255,255,.14),rgba(255,255,255,.04));color:#fff;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 2px 8px rgba(0,0,0,.12);}
.nav-item.active .ic{opacity:1;}
.nav-item.active::before{
  content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:4px;
  border-radius:0 4px 4px 0;background:linear-gradient(180deg,var(--amber),#e6ac4a);
  box-shadow:0 0 12px rgba(208,142,31,.55);
}
.nav-item .badge{font-family:"Oswald",sans-serif;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:9px;background:linear-gradient(135deg,var(--amber),#e0a83f);color:#3a2606;box-shadow:0 2px 6px rgba(0,0,0,.22);flex:0 0 auto;}
/* option nav-item — 琥珀の星で“別オプション”を視覚的に区別（下品にしない） */
.nav-item.opt .ic{color:#e6c478;opacity:.92;}
.nav-item.opt .ni-star{display:inline-flex;width:14px;height:14px;flex:0 0 14px;color:var(--amber);opacity:.92;transition:opacity .2s,transform .2s var(--ease);}
.nav-item.opt .ni-star svg{width:14px;height:14px;}
.nav-item.opt:hover .ni-star{opacity:1;transform:scale(1.08);}
.nav-item.opt.active{background:linear-gradient(90deg,rgba(230,196,120,.16),rgba(230,196,120,.04));}
.nav-item.opt.active::before{background:linear-gradient(180deg,#e6ac4a,var(--amber));}
.sb-foot{
  padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:13px;background:rgba(0,0,0,.12);
}
.sb-foot .av{
  width:38px;height:38px;border-radius:50%;flex:0 0 38px;
  background:linear-gradient(150deg,var(--amber),#e6b052);
  display:flex;align-items:center;justify-content:center;
  color:#3a2606;font-weight:700;font-size:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.3), 0 3px 9px rgba(0,0,0,.25);
}
.sb-foot .who{font-size:12.5px;line-height:1.42;}
.sb-foot .who b{color:#fff;font-weight:700;}
.sb-foot .who span{color:#9cc1aa;font-size:11px;display:block;}

/* ---------- main ---------- */
.main{margin-left:var(--sb-w);flex:1;min-width:0;}
.topbar{display:none;}
.viewwrap{padding:34px 40px 70px;max-width:1340px;}
.page-head{margin-bottom:28px;}
.page-head h1{font-size:24px;letter-spacing:.004em;line-height:1.32;color:var(--ink);font-weight:700;display:flex;align-items:center;gap:11px;}
.page-head h1 .h-star{display:inline-flex;width:24px;height:24px;flex:0 0 24px;align-items:center;justify-content:center;border-radius:9px;background:var(--opt-soft);color:var(--opt);box-shadow:inset 0 0 0 1px var(--opt-line);}
.page-head h1 .h-star svg{width:15px;height:15px;}
.page-head p{margin:9px 0 0;color:var(--muted);font-size:13.5px;max-width:780px;line-height:1.74;}
.view{display:none;animation:fadeUp .38s var(--ease);}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

/* ---------- grid + card ---------- */
.grid{display:grid;gap:20px;}
.grid>*{min-width:0;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:1fr 1fr;}
.g23{grid-template-columns:1.5fr 1fr;}
.g32{grid-template-columns:1fr 1.4fr;}
.card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow-xs);
  padding:24px;transition:box-shadow .24s var(--ease),transform .24s var(--ease),border-color .24s;
}
.card.click{cursor:pointer;}
.card.click:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);border-color:#d4ddd2;}
.card.click:active{transform:translateY(-1px);}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;}
.card-h h3{font-size:15px;font-weight:700;letter-spacing:.012em;color:var(--ink);}
.card-h .sub{font-size:11.5px;color:var(--muted);font-weight:500;white-space:nowrap;}

/* KPI */
.kpi{position:relative;overflow:hidden;}
.kpi::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--green),var(--green-bright));opacity:0;transition:opacity .24s var(--ease);}
.kpi.click:hover::after{opacity:1;}
.kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.01em;}
.kpi .val{font-family:"Oswald",sans-serif;font-weight:600;font-size:33px;line-height:1.1;margin-top:8px;letter-spacing:.012em;color:var(--ink);}
.kpi .delta{font-size:11.5px;font-weight:700;margin-top:8px;display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:20px;}
.kpi .delta.up{color:var(--green);background:var(--green-soft);}
.kpi .delta.warn{color:var(--warn);background:var(--warn-soft);}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;}
.kpi-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--green-soft);color:var(--green);box-shadow:inset 0 0 0 1px rgba(31,107,58,.08);}
.kpi-ic svg{width:22px;height:22px;}
.kpi-ic.amber{background:var(--amber-soft);color:var(--amber-deep);box-shadow:inset 0 0 0 1px rgba(208,142,31,.12);}
.kpi-ic.blue{background:var(--blue-soft);color:var(--blue);box-shadow:inset 0 0 0 1px rgba(44,100,147,.11);}
.kpi-ic.warn{background:var(--warn-soft);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(187,70,49,.11);}

/* chips / badges */
.chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:20px;line-height:1.45;white-space:nowrap;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.02);
}
.chip.green{background:var(--green-soft);color:var(--green);}
.chip.amber{background:var(--amber-soft);color:var(--amber-deep);}
.chip.blue{background:var(--blue-soft);color:var(--blue);}
.chip.warn{background:var(--warn-soft);color:var(--warn);}
.chip.gray{background:#eef1ec;color:var(--muted);}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 0 3px rgba(0,0,0,.04);}

/* buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-size:13px;font-weight:700;padding:10px 18px;border-radius:11px;letter-spacing:.012em;
  transition:background .18s var(--ease),box-shadow .18s var(--ease),transform .1s var(--ease),border-color .18s,color .18s;
}
.btn svg{width:16px;height:16px;}
.btn:active{transform:translateY(1px) scale(.99);}
.btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.btn-amber{background:linear-gradient(135deg,#d4922a,#bd7d18);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 3px 10px rgba(208,142,31,.30);}
.btn-amber:hover{background:linear-gradient(135deg,#c8881f,#ad7012);box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 7px 18px rgba(208,142,31,.36);transform:translateY(-1px);}
.btn-green{background:#fff;color:var(--green);border:1.5px solid var(--green);}
.btn-green:hover{background:var(--green-soft);box-shadow:0 4px 12px rgba(31,107,58,.15);transform:translateY(-1px);}
.btn-ghost{background:#f3f6f2;color:var(--ink-soft);border:1px solid var(--line);}
.btn-ghost:hover{background:#e9efe8;border-color:#d4ddd3;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:9px;}
.btn-sm svg{width:14px;height:14px;}
.btn[disabled]{background:#e9ece8;color:#a9b0a8;box-shadow:none;cursor:not-allowed;border-color:#e9ece8;transform:none;}

/* tables */
.tbl{font-size:13px;}
.tbl th{
  text-align:left;font-family:"Oswald",sans-serif;font-size:11px;font-weight:500;color:var(--muted);
  letter-spacing:.08em;padding:10px 14px;border-bottom:1.5px solid var(--line);
  white-space:nowrap;text-transform:uppercase;
}
.tbl td{padding:13px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr.row{transition:background .15s var(--ease);}
.tbl tbody tr.row:nth-child(even){background:rgba(243,247,243,.45);}
.tbl tbody tr.row:hover{background:var(--green-soft2);}
.tbl .done td{color:#9aa29a;}
.tbl .done .tname{text-decoration:line-through;}
.num{font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:.02em;}

/* avatar mini */
.av-mini{
  width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex:0 0 28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 1px 3px rgba(0,0,0,.18);
}
.who-cell{display:flex;align-items:center;gap:10px;}

/* tabs */
.tabs{display:inline-flex;background:#e8ece6;border:1px solid var(--line);border-radius:13px;padding:4px;gap:3px;margin-bottom:22px;flex-wrap:wrap;box-shadow:inset 0 1px 2px rgba(18,42,24,.04);}
.tab{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);transition:.2s var(--ease);}
.tab:hover{color:var(--ink);}
.tab.active{background:#fff;color:var(--green);box-shadow:var(--shadow-xs);}

/* forms */
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.field label{font-size:12px;font-weight:700;color:var(--ink-soft);}
.field input,.field select,.field textarea{
  font-family:inherit;font-size:13.5px;color:var(--ink);
  border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;background:#fbfcfb;
  transition:border-color .18s,box-shadow .18s,background .18s;width:100%;
}
.field input::placeholder,.field textarea::placeholder{color:#a6ada4;}
.field input:hover,.field select:hover,.field textarea:hover{border-color:#cdd6cc;}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--green);box-shadow:0 0 0 3.5px rgba(31,107,58,.13);background:#fff;
}
.field textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* progress ring */
.ring{transform:rotate(-90deg);}
.ring circle{fill:none;stroke-linecap:round;transition:stroke-dashoffset .95s var(--ease);}

/* bars */
.bar-row{display:grid;grid-template-columns:128px 1fr 56px;align-items:center;gap:13px;margin-bottom:14px;font-size:12px;}
.bar-row:last-child{margin-bottom:2px;}
.bar-track{height:10px;background:#eceff0;border-radius:7px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(18,42,24,.06);}
.bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--green),var(--green-bright));transition:width .85s var(--ease);}

/* alert box */
.alert{
  display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;
  background:linear-gradient(180deg,#fcf3df,var(--amber-soft));border:1px solid #ecd6a8;border-radius:14px;padding:16px 18px;font-size:13px;
  box-shadow:var(--shadow-xs);
}
.alert .ai{flex:0 0 22px;color:var(--amber-deep);margin-top:1px;}
.alert .ai svg{width:22px;height:22px;}
.alert.ok{background:linear-gradient(180deg,#eff6f1,var(--green-soft));border-color:#bcdac6;}
.alert.ok .ai{color:var(--green);}

/* note */
.note{font-size:11.5px;color:var(--muted);margin-top:16px;line-height:1.66;}
.note.box{background:var(--green-soft2);border:1px dashed #cdd8ce;border-radius:12px;padding:13px 15px;}

/* mini list */
.feed{list-style:none;margin:0;padding:0;}
.feed li{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line-soft);font-size:13px;align-items:flex-start;}
.feed li:last-child{border-bottom:none;padding-bottom:0;}
.feed .fic{width:34px;height:34px;border-radius:11px;flex:0 0 34px;display:flex;align-items:center;justify-content:center;background:var(--green-soft);color:var(--green);box-shadow:inset 0 0 0 1px rgba(31,107,58,.07);}
.feed .fic svg{width:18px;height:18px;}
.feed .ft{font-size:11px;color:var(--muted);margin-top:4px;}
.feed .chan{display:inline-flex;gap:5px;margin-top:7px;flex-wrap:wrap;}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.kcol{background:var(--green-soft2);border:1px solid var(--line);border-radius:16px;padding:14px;}
.kcol.appr{background:linear-gradient(180deg,#fcf4e1,var(--amber-soft));border-color:#ecd6a8;}
.kcol h4{font-family:"Oswald",sans-serif;font-size:11.5px;display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:500;}
.kcol h4 .cnt{font-family:"Oswald";font-size:13px;color:var(--ink);background:#fff;border-radius:8px;padding:1px 10px;box-shadow:var(--shadow-xs);}
.kcard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:11px;box-shadow:var(--shadow-xs);transition:.2s var(--ease);cursor:pointer;}
.kcard:last-child{margin-bottom:0;}
.kcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:#d4ddd2;}
.kcard .kt{font-size:12.5px;font-weight:500;line-height:1.55;color:var(--ink-soft);}
.kcard .kmeta{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.pri{width:8px;height:8px;border-radius:50%;display:inline-block;}
.pri.high{background:var(--warn);box-shadow:0 0 0 3px var(--warn-soft);}
.pri.mid{background:var(--amber);box-shadow:0 0 0 3px var(--amber-soft);}
.pri.low{background:#a7afa7;box-shadow:0 0 0 3px #eef1ed;}

/* checkbox */
.cbx{
  width:22px;height:22px;border-radius:7px;border:2px solid #c0c9c0;background:#fff;
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 22px;transition:.2s var(--ease);cursor:pointer;padding:0;
}
.cbx:hover{border-color:var(--green);}
.cbx:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.cbx.on{background:var(--green);border-color:var(--green);box-shadow:0 2px 6px rgba(31,107,58,.28);}
.cbx svg{opacity:0;transform:scale(.5);transition:opacity .18s,transform .22s var(--ease);width:13px;height:13px;color:#fff;}
.cbx.on svg{opacity:1;transform:scale(1);}

/* toggle */
.tg{width:46px;height:26px;border-radius:13px;background:#cbd2cb;position:relative;transition:background .24s var(--ease);flex:0 0 46px;cursor:pointer;padding:0;box-shadow:inset 0 1px 2px rgba(18,42,24,.12);}
.tg:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.tg::after{content:"";position:absolute;top:2.5px;left:2.5px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.28);transition:transform .24s var(--ease);}
.tg.on{background:var(--green);}
.tg.on::after{transform:translateX(20px);}

/* donut center */
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.donut-center{position:absolute;text-align:center;}
.donut-center .dl{font-size:11px;color:var(--muted);font-weight:600;}
.donut-center .dv{font-family:"Oswald";font-size:21px;font-weight:600;color:var(--ink);}
.legend{margin-top:14px;display:flex;flex-direction:column;gap:12px;}
.legend .lg{display:flex;align-items:center;gap:11px;font-size:12.5px;}
.legend .sw{width:12px;height:12px;border-radius:4px;flex:0 0 12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
.legend .lg .pct{margin-left:auto;font-family:"Oswald";font-weight:500;color:var(--ink-soft);}

/* matrix */
.matrix td,.matrix th{text-align:center;}
.matrix td:first-child,.matrix th:first-child{text-align:left;}
.mk{font-weight:700;font-size:15px;}
.mk.o{color:var(--green);} .mk.x{color:var(--warn);} .mk.dash{color:#c2cbc2;}

/* shift grid */
.shiftgrid{font-size:12px;}
.shiftgrid th{text-align:center;}
.shiftgrid td{text-align:center;padding:10px 6px;border-bottom:1px solid var(--line-soft);}
.shiftgrid td:first-child{text-align:left;font-weight:700;}
.scell{display:inline-block;padding:4px 10px;border-radius:9px;background:var(--green-soft);color:var(--green);font-weight:600;font-size:11px;white-space:nowrap;box-shadow:inset 0 0 0 1px rgba(31,107,58,.06);}
.scell.off{background:#eef1ec;color:#9aa29a;box-shadow:none;}
.scell.early{background:var(--blue-soft);color:var(--blue);box-shadow:inset 0 0 0 1px rgba(44,100,147,.08);}

/* timeline */
.timeline{position:relative;padding-left:26px;}
.timeline::before{content:"";position:absolute;left:6px;top:5px;bottom:5px;width:2px;background:var(--line);}
.tl-item{position:relative;margin-bottom:22px;}
.tl-item:last-child{margin-bottom:0;}
.tl-item::before{content:"";position:absolute;left:-26px;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--green);box-shadow:0 0 0 3px #fff, 0 1px 4px rgba(31,107,58,.25);}
.tl-item.warn::before{border-color:var(--amber);box-shadow:0 0 0 3px #fff, 0 1px 4px rgba(208,142,31,.3);}
.tl-date{font-family:"Oswald";font-weight:500;font-size:13px;color:var(--ink-soft);letter-spacing:.02em;}
.tl-t{font-size:12.5px;color:var(--muted);margin-top:3px;}

/* memory cards */
.memo{border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:12px;background:#fbfcfb;transition:.2s var(--ease);}
.memo:last-child{margin-bottom:0;}
.memo:hover{border-color:#d4ddd2;box-shadow:var(--shadow-xs);background:#fff;}
.memo .mt{font-size:12.5px;line-height:1.6;color:var(--ink-soft);}

.memo .mf .acts{display:flex;gap:6px;}
.txtbtn{font-size:11px;color:var(--green);font-weight:700;padding:3px 9px;border-radius:8px;transition:.15s;}
.txtbtn:hover{background:var(--green-soft);}
.txtbtn:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}
.txtbtn.del{color:var(--warn);}
.txtbtn.del:hover{background:var(--warn-soft);}

/* proposal */
.prop{border:1px solid var(--line);border-left:3px solid var(--green);border-radius:13px;padding:15px 17px;margin-bottom:13px;background:#fff;transition:.24s var(--ease);}
.prop:last-child{margin-bottom:0;}
.prop:hover{box-shadow:var(--shadow-sm);border-left-color:var(--green-bright);transform:translateX(2px);}
.prop .pt{font-size:13px;line-height:1.64;color:var(--ink-soft);}
.prop .pa{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}

/* chat */
.chat{display:flex;flex-direction:column;height:354px;}
.chat-log{flex:1;overflow-y:auto;padding:4px 6px 4px 2px;display:flex;flex-direction:column;gap:13px;}
.bub{max-width:86%;padding:11px 15px;border-radius:16px;font-size:12.5px;line-height:1.62;animation:bubIn .32s var(--ease);}
@keyframes bubIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
.bub.me{align-self:flex-end;background:linear-gradient(135deg,var(--green),var(--green-bright));color:#fff;border-bottom-right-radius:5px;box-shadow:0 3px 10px rgba(31,107,58,.24);}
.bub.ai{align-self:flex-start;background:#eef1ec;color:var(--ink-soft);border-bottom-left-radius:5px;}
.bub.ai b{color:var(--green);}

.typing{display:inline-flex;gap:4px;align-items:center;}

.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

/* toast */
.toast-wrap{position:fixed;right:24px;bottom:24px;z-index:90;display:flex;flex-direction:column;gap:11px;max-width:calc(100vw - 48px);}
.toast{

  box-shadow:0 16px 40px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.05);display:flex;align-items:center;gap:12px;
  animation:toastIn .36s var(--ease);border:1px solid rgba(255,255,255,.07);
}
.toast.out{animation:toastOut .3s forwards;}
.toast .ti{width:24px;height:24px;flex:0 0 24px;color:#86e2a4;display:flex;align-items:center;justify-content:center;background:rgba(134,226,164,.14);border-radius:8px;}
.toast .ti svg{width:15px;height:15px;}
@keyframes toastIn{from{opacity:0;transform:translateX(36px) scale(.95);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateX(36px) scale(.95);}}

.scrim{display:none;}

/* util */

function kpiCard(opt){
  const c = el("div","card kpi"+(opt.go?" click":""));
  if(opt.go) c.dataset.go = opt.go;
  c.innerHTML = `
    <div class="kpi-top">
      <div class="kpi-ic ${opt.tone||""}">${opt.icon}</div>
      ${opt.ring!=null? ringSvg(opt.ring,opt.ringTxt):""}
    </div>
    <div class="lbl mt8">${opt.lbl}</div>
    <div class="val">${opt.val}</div>
    ${opt.delta? `<div class="delta ${opt.deltaTone||"up"}">${opt.delta}</div>`:""}
  `;
  return c;
}
function ringSvg(pct,txt){
  const r=20, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="52" height="52" class="ring"><circle cx="26" cy="26" r="${r}" stroke="#eef1ed" stroke-width="6"/><circle cx="26" cy="26" r="${r}" stroke="#1f6b3a" stroke-width="6" stroke-dasharray="${c}" stroke-dashoffset="${off}"/><text x="26" y="26" transform="rotate(90 26 26)" text-anchor="middle" dominant-baseline="central" style="font-family:Oswald;font-weight:700;font-size:13px;fill:#1f262c">${txt}</text></svg>`;
}

/* donut via conic-gradient */
function donut(segs,centerLbl,centerVal){
  let acc=0; const stops=[];
  segs.forEach(s=>{const start=acc; acc+=s.pct; stops.push(`${s.color} ${start}% ${acc}%`);});
  const wrap=el("div","donut-wrap");
  wrap.innerHTML = `
    <div style="width:172px;height:172px;border-radius:50%;background:conic-gradient(${stops.join(",")});display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(20,40,25,.10)">
      <div style="width:110px;height:110px;border-radius:50%;background:#fff;box-shadow:inset 0 1px 5px rgba(0,0,0,.07)"></div>
    </div>
    <div class="donut-center"><div class="dl">${centerLbl}</div><div class="dv">${centerVal}</div></div>`;
  return wrap;
}

/* toast */
function toast(msg){
  const w=$("#toastWrap");
  const t=el("div","toast",`<span class="ti">${I.check}</span><span>${msg}</span>`);
  w.appendChild(t);
  setTimeout(()=>{t.classList.add("out");setTimeout(()=>t.remove(),300);},2600);
}

function openDemoModal(opt){
  const ov=$("#demoModal");

  $("#demoModalBadges").innerHTML=`${optBadge(true)}<span class="mh-sub">このパックの標準には含まれません</span>`;

  demoLastFocus=document.activeElement;
  ov.classList.add("open");
  ov.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  setTimeout(()=>{const x=$("#demoModalClose");if(x)x.focus();},60);
}
function closeDemoModal(){
  const ov=$("#demoModal");
  if(!ov.classList.contains("open"))return;
  ov.classList.remove("open");
  ov.setAttribute("aria-hidden","true");
  document.body.style.overflow="";
  setTimeout(()=>{$("#demoModalBody").innerHTML="";},260);
  if(demoLastFocus&&typeof demoLastFocus.focus==="function"){try{demoLastFocus.focus();}catch(e){/* no-op */}}
  demoLastFocus=null;
}
/* close wiring: ×ボタン / オーバーレイクリック / Escキー */
(function wireDemoModal(){
  const ov=$("#demoModal");
  if(!ov)return;
  $("#demoModalClose").addEventListener("click",closeDemoModal);
  ov.addEventListener("mousedown",e=>{if(e.target===ov)closeDemoModal();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape"&&ov.classList.contains("open"))closeDemoModal();});
})();

/* checkbox factory */
function checkbox(on,onToggle){
  const b=el("button","cbx"+(on?" on":""),I.check);
  b.type="button";
  b.setAttribute("aria-pressed",on);
  b.onclick=()=>{const nv=!b.classList.contains("on");b.classList.toggle("on",nv);b.setAttribute("aria-pressed",nv);onToggle(nv);};
  return b;
}
/* toggle factory */
function toggle(on,onChange){
  const t=el("button","tg"+(on?" on":""));
  t.type="button";
  t.setAttribute("role","switch");t.setAttribute("aria-checked",on);
  t.onclick=()=>{const nv=!t.classList.contains("on");t.classList.toggle("on",nv);t.setAttribute("aria-checked",nv);if(onChange)onChange(nv);};
  return t;
}

      const kb=el("div","kanban");
      cols.forEach(([cid,clbl])=>{
        const items=list.filter(t=>t.col===cid);
        const cnt=cid==="done"?(completedCount+WEEK_BASE):items.length;
        const col=el("div","kcol"+(cid==="appr"?" appr":""));
        col.innerHTML=`<h4>${clbl}<span class="cnt">${cnt}</span></h4>`;
        items.forEach(t=>{

          c.innerHTML=`<div class="kt">${t.n}</div>

              <div class="who-cell"><span class="av-mini" style="width:23px;height:23px;flex-basis:23px;background:${avColor(t.who)}">${initial(t.who)}</span><span class="num" style="font-size:11px;color:var(--muted)">${t.due}</span></div>

      body.appendChild(kb);
      body.appendChild(el("div","note","かんばんのカードはクリックで詳細（今後実装）。優先度の赤ドット＝高。"));

  sel.onchange=renderBody;

  // add submit
  addForm.querySelector("#ntSubmit").onclick=()=>{
    const nm=addForm.querySelector("#ntName").value.trim();
    if(!nm){toast("内容を入力してください");return;}
    const who=addForm.querySelector("#ntWho").value.trim()||"社長";

    addForm.querySelector("#ntName").value="";
    addForm.style.display="none";
    render();

  };

  v.appendChild(footer());
  return v;
}

        tr.appendChild(el("td",null,`<span class="${cls}">${val}</span>`));
      }
      tb.appendChild(tr);
    });
    if(!shown){
      const tr=el("tr");tr.appendChild(el("td",null,'<div style="padding:18px;color:var(--muted);font-size:12.5px">反映対象の従業員がいません。上のトグルで誰かをONにしてください。</div>'));
      tr.firstChild.colSpan=8;tb.appendChild(tr);
    }
    tbl.appendChild(tb);
    const sc=el("div","tbl-scroll");sc.appendChild(tbl);tCard.appendChild(sc);
    grid.appendChild(tCard);

    // indicators
    const iCard=el("div","card");
    iCard.innerHTML=`<div class="card-h"><h3>充足 / コスト指標</h3></div>`;
    const mk=(lbl,val)=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-soft)"><span style="font-size:12.5px;color:var(--muted)">${lbl}</span><span style="text-align:right">${val}</span></div>`;
    const ind=el("div");
    ind.innerHTML=`
      ${mk("必要人数 充足",'月✅ 火✅ <span class="chip warn" style="font-size:10px;padding:1px 7px">水⚠</span> 木✅ 金✅ 土✅')}

      ${mk("週あたり人件費（概算）",'<span class="num" style="font-size:17px">¥412,000</span>')}
      ${mk("法定休憩・連続勤務",'<span class="chip green" style="font-size:10px;padding:1px 8px">違反 0件</span>')}`;
    ind.lastElementChild.style.borderBottom="none";
    iCard.appendChild(ind);
    grid.appendChild(iCard);
    res.appendChild(grid);

    // alert + approve
    const aWrap=el("div");aWrap.style.marginTop="18px";
    if(!shiftApproved){
      const al=el("div","alert");
      al.innerHTML=`<span class="ai">${I.bell}</span><div style="flex:1;min-width:200px"><b>水曜午前 配送1名不足</b>　候補：山口さんを9時入りに変更で解消（人件費 +¥0）。</div>`;
      const apBtn=el("button","btn btn-amber");apBtn.textContent="この案を採用（社長承認）";
      apBtn.onclick=()=>{shiftApproved=true;renderResult();toast("シフトを確定しました（社長承認済）");};
      al.appendChild(apBtn);
      aWrap.appendChild(al);
    } else {
      const al=el("div","alert ok");
      al.innerHTML=`<span class="ai">${I.check}</span><div><b>このシフトを確定しました（社長承認済）。</b> 各人へ通知を配信準備しました。実際の確定連絡は社長操作で送信されます。</div>`;
      aWrap.appendChild(al);
    }
    res.appendChild(aWrap);
    res.appendChild(el("div","note box","自動作成した案は必ず責任者（社長＝雇用主）が承認してから確定。労基法の確認と確定は雇用主が行います。異常値（連続勤務・休憩割れ）は自動で警告します。デモ用サンプル。"));
  }

  genBtn.onclick=()=>{
    shiftGenerated=true;shiftApproved=false;
    renderResult();
    res.scrollIntoView({behavior:"smooth",block:"nearest"});
    toast("シフト案を作成しました");
  };
  renderResult();

  v.appendChild(footer());
  return v;
}

    <div class="field"><label>金額（円）</label><input id="sAmt" type="number" inputmode="numeric" placeholder="例：54000"></div>
    <div class="field"><label>メモ</label><input id="sMemo" placeholder="例：野菜定期便"></div>
    <button class="btn btn-amber" id="sSubmit" style="width:100%">入力する（社内共有）</button>

const AI_REPLIES=[
  "承知しました。要点を3行でまとめます。①数字は確認済みの範囲でお答え ②不確かな点は推測せず印を付けます ③送信・送金は社長の確認後です。",

let replyIdx=0;

function viewKioku(){
  const v=el("div","view");
  v.innerHTML=`<div class="page-head"><h1>専属AI 記憶ノート</h1><p>あなたの会社を覚えた専属AIが、聞く前に「次やること」を先回りで提案。督促・補助金・シフトの取りこぼしを防ぎます。</p></div>`;

  const grid=el("div","grid g3");

  // memo column
  const mCard=el("div","card");
  mCard.innerHTML=`<div class="card-h"><h3>覚えていること</h3><span class="chip green"><span class="d"></span>社長が編集可</span></div>`;
  const mList=el("div");mList.id="memoList";
  mCard.appendChild(mList);
  mCard.appendChild(el("div","note","記憶はこの会社の中だけ。要配慮情報はマスキングして外部AIに送りません。"));
  grid.appendChild(mCard);

  // proposals column
  const pCard=el("div","card");
  pCard.innerHTML=`<div class="card-h"><h3>先回り提案（今朝）</h3><span class="chip amber"><span class="d"></span>AIから</span></div>`;
  const pList=el("div");pList.id="propList";
  pCard.appendChild(pList);
  grid.appendChild(pCard);

  // chat column
  const cCard=el("div","card");
  cCard.innerHTML=`<div class="card-h"><h3>チャット</h3><span class="sub">記憶を踏まえて回答</span></div>`;
  const chat=el("div","chat");
  const log=el("div","chat-log");log.id="chatLog";
  const inWrap=el("div","chat-in");
  const inp=el("input");inp.placeholder="例：来週の段取りは？";inp.setAttribute("aria-label","チャット入力");
  const send=el("button","btn btn-amber btn-sm","送信");
  inWrap.append(inp,send);
  chat.append(log,inWrap);
  cCard.appendChild(chat);
  grid.appendChild(cCard);

  v.appendChild(grid);
  v.appendChild(el("div","note box","送信・送金は社長確認。AIは下書き・案・提案までです（デモ）。"));

  function renderMemos(){
    mList.innerHTML="";
    memos.forEach((m,i)=>{
      const c=el("div","memo");
      c.innerHTML=`<div class="mt">${m.t}</div><div class="mf"><span class="when">${m.when}</span><span class="acts"><button class="txtbtn" data-edit="${i}">編集</button><button class="txtbtn del" data-del="${i}">削除</button></span></div>`;
      mList.appendChild(c);
    });
    $$("[data-del]",mList).forEach(b=>b.onclick=()=>{memos.splice(+b.dataset.del,1);renderMemos();toast("記憶を削除しました");});
    $$("[data-edit]",mList).forEach(b=>b.onclick=()=>{const i=+b.dataset.edit;const nv=prompt("記憶を編集",memos[i].t);if(nv!=null&&nv.trim()){memos[i].t=nv.trim();memos[i].when="たった今 更新";renderMemos();toast("記憶を更新しました");}});
  }
  function renderProps(){
    pList.innerHTML="";
    if(!proposals.length){pList.innerHTML='<div style="font-size:12.5px;color:var(--muted);padding:16px 4px;text-align:center">先回り提案はすべて処理済みです。</div>';return;}
    proposals.forEach((p)=>{
      const c=el("div","prop");
      c.innerHTML=`<div class="pt">${p.t}</div>`;
      const pa=el("div","pa");
      const ok=el("button","btn btn-amber btn-sm","採用");
      const later=el("button","btn btn-ghost btn-sm","あとで");
      const no=el("button","btn btn-ghost btn-sm","却下");
      const removeWith=(msg)=>{c.style.opacity="0";c.style.transform="translateX(22px)";setTimeout(()=>{const ix=proposals.indexOf(p);if(ix>-1)proposals.splice(ix,1);renderProps();},250);toast(msg);};
      ok.onclick=()=>removeWith("採用しました（下書きを準備）");
      later.onclick=()=>removeWith("「あとで」に移しました");
      no.onclick=()=>removeWith("却下しました");
      pa.append(ok,later,no);c.appendChild(pa);
      c.style.transition="opacity .25s var(--ease),transform .25s var(--ease)";
      pList.appendChild(c);
    });
  }
  function renderChat(){
    log.innerHTML="";
    chatLog.forEach(m=>{
      const b=el("div","bub "+m.who);b.innerHTML=m.t;
      log.appendChild(b);
    });
    log.scrollTop=log.scrollHeight;
  }
  renderMemos();renderProps();renderChat();

  let waiting=false;
  const doSend=()=>{
    const t=inp.value.trim();if(!t||waiting)return;
    chatLog.push({who:"me",t});inp.value="";renderChat();
    waiting=true;
    const typing=el("div","bub ai");typing.innerHTML='<span class="typing"><span></span><span></span><span></span></span>';
    log.appendChild(typing);log.scrollTop=log.scrollHeight;
    setTimeout(()=>{
      typing.remove();
      chatLog.push({who:"ai",t:AI_REPLIES[replyIdx%AI_REPLIES.length]});replyIdx++;renderChat();
      waiting=false;
    },650);
  };
  send.onclick=doSend;
  inp.onkeydown=e=>{if(e.key==="Enter")doSend();};

  v.appendChild(footer());
  return v;
}

function requestAdmin(){
  const ov=el("div");ov.style.cssText="position:fixed;inset:0;z-index:135;background:rgba(14,30,20,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:13vh 18px;animation:fadeUp .2s ease";
  const p=el("div");p.style.cssText="width:100%;max-width:380px;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(14,30,20,.34);overflow:hidden";
  p.innerHTML=`<div style="background:linear-gradient(135deg,#14512a,#1f6b3a);color:#fff;padding:16px 20px;font-weight:700;display:flex;align-items:center;gap:9px">🔒 管理者に切り替え</div>
   <div style="padding:18px 20px">
     <div style="font-size:12.5px;color:#3a444b;line-height:1.7;margin-bottom:11px">管理者画面（お金・全社の数字・補助金・設定）に入るにはパスワードが必要です。</div>
     <input id="admPw" type="password" placeholder="パスワード" style="width:100%;border:1.5px solid #dde3dd;border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit">
     <div style="font-size:11px;color:#6e7872;margin-top:8px;line-height:1.6">※デモ用：空のまま、または「demo」で入れます（本番はパスワード必須にできます）。</div>
     <div style="display:flex;gap:8px;margin-top:15px"><button id="admGo" style="flex:1;border:none;border-radius:10px;padding:11px;background:linear-gradient(135deg,#d08e1f,#a96a10);color:#fff;font-weight:700;cursor:pointer">管理者で入る</button><button id="admCancel" style="border:1px solid #dde3dd;background:#fff;border-radius:10px;padding:11px 16px;cursor:pointer">やめる</button></div>
   </div>`;
  ov.appendChild(p);document.body.appendChild(ov);
  const close=()=>{ov.remove();document.removeEventListener("keydown",onKey);};
  const enter=()=>{ close(); setRole("admin"); toast("管理者に切り替えました"); };
  function onKey(e){ if(e.key==="Escape")close(); if(e.key==="Enter")enter(); }
  ov.addEventListener("mousedown",e=>{if(e.target===ov)close();});
  document.addEventListener("keydown",onKey);
  p.querySelector("#admCancel").onclick=close;
  p.querySelector("#admGo").onclick=enter;
  setTimeout(()=>{const i=p.querySelector("#admPw");if(i)i.focus();},60);
}

/* ---- 案件・アポ：さわると数字が動く（状態更新＋詳細ドロワー＋アポ記録） ---- */
const EIGYO_STAGES=["リード","アポ獲得","商談中","見積提出","受注"];
const STAGE_PROB={"リード":10,"アポ獲得":25,"商談中":50,"見積提出":70,"受注":100};
const STAGE_PTS ={"リード":0,"アポ獲得":10,"商談中":20,"見積提出":30,"受注":100};

/* 5日以上 連絡できていない（＝フォロー推奨）案件を判定。別スクリプト(FAB)からも呼べるよう関数宣言 */
function needsFollow(d){
  if(!d||d.stage==="受注") return false;
  const m=String(d.last||"").match(/(\d+)\s*日前/);
  const days=m?parseInt(m[1],10):0;
  return days>=5;
}
function eigyoFollowList(){
  return (typeof EIGYO!=="undefined"&&EIGYO.deals)?EIGYO.deals.filter(needsFollow):[];
}

function followDraftText(d){
  const base={
    "アポ獲得":"この度はお打ち合わせのお時間をいただき、誠にありがとうございます。当日は御社の事務作業のうち、特にお手間のかかっている点を伺い、AI社員でどれだけ軽くできるかを具体例でご提示いたします。お手元の資料のご準備は不要です。",
    "商談中":"先日はお時間をいただきありがとうございました。その後ご検討状況はいかがでしょうか。ご懸念点があれば、実際の画面で動かしながら一つずつ解消いたします。まずは小さく1機能からのお試しも可能です。",
    "見積提出":"先日はお見積りの機会をいただき、ありがとうございました。ご不明点やご予算とのすり合わせがございましたら、遠慮なくお申し付けください。30日間の全額返金保証付きですので、リスクなくお試しいただけます。",
    "受注":"この度はご契約をいただき、誠にありがとうございます。導入はこちらで2営業日ほどで整えます。初月は私どもが伴走いたしますのでご安心ください。",
    "リード":"はじめまして、株式会社気持ち市場でございます。御社の事務作業を、人を増やさずAI社員で軽くするお手伝いをしております。よろしければ一度、無料の『事務の健康診断』だけでもいかがでしょうか。"
  };
  return base[d.stage]||base["リード"];
}
function dealTimeline(d){
  const idx=EIGYO_STAGES.indexOf(d.stage);
  const days=["20日前","14日前","9日前","5日前","昨日"];
  const labelMap={"リード":"リード獲得","アポ獲得":"アポ獲得","商談中":"商談を実施","見積提出":"見積を提出","受注":"受注・契約"};
  const items=[];
  for(let i=0;i<=idx;i++) items.push({when:days[i]||"先日", what:labelMap[EIGYO_STAGES[i]]});
  return items.reverse();
}

      </div>
      <div style="margin-top:12px"><span class="chip ${chipCls}" style="background:rgba(255,255,255,.18);color:#fff"><span class="d" style="background:#fff"></span>${d.stage}</span></div>
    </div>
    <div style="padding:20px 22px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px">

function advanceStage(d){
  const i=EIGYO_STAGES.indexOf(d.stage);
  if(i<0||i>=EIGYO_STAGES.length-1) return;
  const from=d.stage, to=EIGYO_STAGES[i+1];
  const pf=EIGYO.pipeline.find(p=>p.s===from), pt=EIGYO.pipeline.find(p=>p.s===to);
  if(pf&&pf.n>0)pf.n--; if(pt)pt.n++;
  d.stage=to; d.prob=STAGE_PROB[to]; d.last="たった今";
  EIGYO.pts+=STAGE_PTS[to];
  if(to==="受注"){ EIGYO.juchuN++; EIGYO.juchuAmt+=(d.amt||0); }
  d.next=(to==="受注")?"契約書を送付（社長確認）":"次の打ち手をAIが提案";
  toast(d.name+"を「"+to+"」へ進めました（+"+STAGE_PTS[to]+"pt）");
  if(typeof render==="function") render();
}

/* ====================================================================
   事務員1人分コスト削減シミュレーター＝メイン機能（営業の決め手）
   議員・社長が値付け軸で何度も言った「20万を3万に」を機能化。試算。
==================================================================== */
function viewSim(){
  const v=el("div","view");
  v.innerHTML=`<div class="page-head"><h1>コスト削減シミュレーター<span style="font-size:12px;font-weight:700;color:#fff;background:var(--green);padding:2px 10px;border-radius:20px;margin-left:10px;vertical-align:middle">メイン機能</span></h1><p>「事務の人件費」と「AI社員パック」を比べて、年間いくら浮くかをその場で試算します。商談でそのまま使えます。</p></div>`;
  const PACK_M=29800; // スタンダード月額
  // 入力
  const inc=el("div","card");inc.style.marginBottom="18px";
  inc.innerHTML=`<div class="card-h"><h3>入力</h3><span class="sub" style="color:var(--muted)">数字を動かすと下が変わります</span></div>`;
  const mkNum=(lbl,id,val,unit)=>{const w=el("div");w.style.cssText="margin:10px 0";w.innerHTML=`<div style="font-size:13px;font-weight:700;margin-bottom:5px">${lbl}</div><div style="display:flex;align-items:center;gap:8px"><input id="${id}" type="number" value="${val}" style="width:160px;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit"><span style="font-size:13px;color:var(--muted)">${unit}</span></div>`;return w;};
  inc.append(mkNum("事務スタッフの月給（1人あたり）","simPay",180000,"円 / 月"));
  inc.append(mkNum("AIで肩代わりしたい人数の目安","simN",1,"人分の事務作業"));
  v.append(inc);
  // 結果
  const out=el("div","card");
  out.innerHTML=`<div class="card-h"><h3>試算の結果</h3><span class="sub" style="color:var(--muted)">年間ベース</span></div>`;
  const res=el("div");res.id="simRes";out.append(res);
  out.append(el("div","note box","これは試算です（効果を保証するものではありません）。AIは“定型のくり返し事務”を肩代わりするもので、人をそのまま置き換える前提ではありません。実際の削減は業務内容により異なります。送信・支払い・確定は人。"));
  v.append(out);
  const calc=()=>{
    const pay=Math.max(0, +(document.getElementById("simPay")||{}).value||0);
    const n=Math.max(0, +(document.getElementById("simN")||{}).value||0);
    const human=pay*12*n;            // 年間人件費
    const pack=PACK_M*12;            // 年間パック額
    const save=human-pack;           // 年間削減見込み
    const r=document.getElementById("simRes"); if(!r)return;
    const bar=(lbl,amt,color,base)=>{const pct=base>0?Math.min(100,Math.round(amt/base*100)):0;return `<div style="margin:9px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${lbl}</span><b style="font-family:'Oswald'">${yen(amt)}</b></div><div style="background:#eef3ee;border-radius:7px;height:18px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color}"></div></div></div>`;};
    const base=Math.max(human,pack,1);
    r.innerHTML=`
      ${bar("いまの事務の人件費（年）",human,"#c0392b",base)}
      ${bar("AI社員パック（年・スタンダード）",pack,"#1f6b3a",base)}
      <div style="margin-top:16px;padding:16px 18px;border-radius:14px;background:linear-gradient(135deg,#14512a,#1f6b3a);color:#fff">
        <div style="font-size:13px;color:#bfe6cd">年間の削減見込み（試算）</div>
        <div style="font-family:'Oswald';font-weight:700;font-size:40px;line-height:1.1;margin-top:2px">${save>=0?"":"−"}${yen(Math.abs(save))}</div>
        <div style="font-size:12.5px;color:#d6ecdd;margin-top:4px">${save>=0?("月あたり 約"+yen(Math.round(save/12))+" のゆとり。浮いた分を本業や人の時間に回せます。"):"この条件ではパック費が上回ります。人数や月給の前提を見直してください。"}</div>
      </div>`;
  };
  setTimeout(calc,40);
  // 入力イベントは描画後にバインド
  setTimeout(()=>{["simPay","simN"].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener("input",calc);});},60);
  v.append(footer());
  return v;
}

  v.innerHTML=`<div class="page-head"><h1>導入のしかた（使う機能を選ぶ）<span style="font-size:12px;font-weight:700;color:#fff;background:var(--green);padding:2px 10px;border-radius:20px;margin-left:10px;vertical-align:middle">メイン機能</span></h1><p>全部を一気に変えません。<b>今の紙のやり方を残したまま</b>、変えたい所だけデジタルにできます。市場や職人の現場の「アナログじゃないといけない部分」はそのままでOKです。</p></div>`;
  const msg=el("div");msg.style.cssText="background:var(--green-soft2);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:12px 15px;font-size:13.5px;line-height:1.7;margin-bottom:16px";
  msg.innerHTML=`<b style="color:#14512a">導入しても、今の仕事のやり方は壊しません。</b> 「ここは紙のまま」「ここだけデジタル」を業務ごとに選べます。後からいつでも変えられます。`;
  v.append(msg);
  const state=DONYU_ITEMS.map(x=>({...x}));
  const card=el("div","card");
  card.innerHTML=`<div class="card-h"><h3>業務ごとに選ぶ</h3><span id="donyuCount" class="sub" style="color:var(--muted)"></span></div>`;
  const list=el("div");
  const updCount=()=>{const c=document.getElementById("donyuCount");if(c){const n=state.filter(s=>s.on).length;c.textContent="デジタル化 "+n+"個 ／ 紙のまま "+(state.length-n)+"個";}};
  const rowEls=[];
  state.forEach((s,i)=>{
    const r=el("div");r.style.cssText="display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px dashed var(--line)";
    const nm=el("div");nm.style.cssText="flex:1;font-weight:700;font-size:14px";nm.textContent=s.k;
    const tg=el("button");tg.style.cssText="flex:0 0 auto;border:none;border-radius:20px;padding:6px 16px;font-weight:700;font-size:12.5px;cursor:pointer;transition:.12s";
    const paint=()=>{tg.textContent=s.on?"デジタル化":"紙のまま";tg.style.background=s.on?"var(--green)":"#e6e1d8";tg.style.color=s.on?"#fff":"#7a7468";};
    tg.onclick=()=>{s.on=!s.on;paint();updCount();};
    paint();r.append(nm,tg);list.append(r);rowEls.push({s,paint});
  });
  card.append(list);
  // プリセット
  const pre=el("div");pre.style.cssText="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px";
  const applyPreset=(map)=>{rowEls.forEach(({s,paint})=>{s.on=map(s.k);paint();});updCount();};
  const mk=(lbl,fn)=>{const b=el("button","btn btn-opt-o btn-sm");b.textContent=lbl;b.onclick=()=>fn();return b;};
  pre.append(
    mk("🏪 市場・職人向け（競り・伝票だけ）", ()=>applyPreset(k=>["競り（セリ）","紙の伝票","発注（青果）"].includes(k))),
    mk("🚀 まるごとデジタル", ()=>applyPreset(()=>true)),
    mk("🐣 最小から（お金まわりだけ）", ()=>applyPreset(k=>["入金照合","請求書づくり","経費仕分け"].includes(k)))
  );
  card.append(pre);v.append(card);
  setTimeout(updCount,30);
  v.append(el("div","note box","「全部自動化」を押し付けません。今のやり方（紙・電話・FAX）を残したまま、効く所だけ小さく始められます。最終の判断・確定は人が行います。"));
  v.append(footer());
  return v;
}

  {q:"最近やる気が出ない", a:"社長業は孤独で、気分に波があって当たり前です。今月は売上が前月比+12%と、数字はちゃんと出ています。完璧を求めすぎず、休む時間も予定に1つ入れませんか。ここでは何でも吐き出して大丈夫です。"},

  {q:"従業員に言いづらいことがある", a:"言いづらいことほど、①事実ベースで ②1対1で ③改善前提で 伝えると角が立ちません。相手と内容を教えていただければ、伝え方の台本を下書きします（送るかは社長が決めます）。"}
];
function viewSoudan(){
  const v=el("div","view");
  v.innerHTML=`<div class="page-head"><h1>社長専用の相談<span style="font-size:12px;font-weight:700;color:#fff;background:#7a4ea0;padding:2px 10px;border-radius:20px;margin-left:10px;vertical-align:middle">🔒 誰にも見えません</span></h1><p>番頭が「会社の弱点」を答えるのに対し、ここは<b>社長おひとりの悩み</b>を、誰にも見られずに話せる相手です。従業員・経理には一切表示されません。</p></div>`;
  // 週次の気になる兆候
  const ki=el("div","card");ki.style.cssText="margin-bottom:18px;border-left:5px solid #7a4ea0";
  ki.innerHTML=`<div class="card-h"><h3>今週、そっとお伝えしたいこと</h3><span class="sub" style="color:var(--muted)">ケアのための気づき・評価ではありません</span></div>`;
  const kiList=["Aさんの日報の言葉数が先週より減っています。疲れがたまっているかもしれません。","鈴木さんの残業が3日続きました。負荷が偏っていないか気にかけてみては。","社長ご自身も今週は休みが0日です。1コマだけでも休息を。"];
  kiList.forEach(t=>{const r=el("div");r.style.cssText="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px;line-height:1.6";r.innerHTML=`<span style="color:#7a4ea0">●</span><span>${t}</span>`;ki.append(r);});
  v.append(ki);
  // プライベートチャット
  const chat=el("div","card");
  chat.innerHTML=`<div class="card-h"><h3>誰にも見えない相談</h3><span class="sub" style="color:var(--muted)">ここでの会話は社外にも社内にも出ません</span></div>`;
  const log=el("div");log.id="soudanLog";log.style.cssText="display:flex;flex-direction:column;gap:12px;margin:6px 0 14px;max-height:300px;overflow:auto;padding:4px";
  const greet=el("div");greet.style.cssText="align-self:flex-start;max-width:94%;background:#faf7fd;border:1px solid #e4d8ef;border-radius:14px 14px 14px 4px;padding:13px 15px;font-size:13px;line-height:1.7";
  greet.innerHTML="社長、お疲れさまです。ここは誰にも見えません。今日はどんなことが気がかりですか。";
  log.append(greet);chat.append(log);
  const ans=(q,a)=>{
    const u=el("div");u.style.cssText="align-self:flex-end;max-width:80%;background:#7a4ea0;color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;font-size:13.5px";u.textContent=q;log.append(u);
    const w=el("div");w.style.cssText="align-self:flex-start;max-width:94%;background:#faf7fd;border:1px solid #e4d8ef;border-radius:14px 14px 14px 4px;padding:13px 15px;font-size:13px;line-height:1.7";w.textContent=a;log.append(w);
    log.scrollTop=log.scrollHeight;
  };
  const chips=el("div");chips.style.cssText="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px";
  SOUDAN_QA.forEach(x=>{const c=el("button","btn btn-opt-o btn-sm");c.textContent=x.q;c.onclick=()=>ans(x.q,x.a);chips.append(c);});
  chat.append(chips);
  const row=el("div");row.style.cssText="display:flex;gap:8px";
  const inp=el("input");inp.type="text";inp.placeholder="思っていることを、そのまま…";inp.style.cssText="flex:1;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-size:13px;font-family:inherit";
  const send=el("button","btn btn-sm","話す");send.style.cssText+="background:#7a4ea0;color:#fff;border:none";
  const ask=()=>{const q=inp.value.trim();if(!q)return;let hit=SOUDAN_QA.find(x=>q.includes(x.q.slice(0,4)));
    if(q.match(/資金|お金|不安|眠れ/))hit=SOUDAN_QA[2];
    else if(q.match(/評価|Aさん|部下|社員/))hit=SOUDAN_QA[1];
    else if(q.match(/やる気|疲れ|しんど|孤独/))hit=SOUDAN_QA[0];
    else if(q.match(/言いづらい|伝え|注意/))hit=SOUDAN_QA[3];
    ans(q, hit?hit.a:"そう感じるのは、それだけ真剣に会社と向き合っている証拠です。よければ、もう少し詳しく聞かせてください。事実を一緒に整理すると、次の一歩が見えてきます。");
    inp.value="";};
  send.onclick=ask;inp.addEventListener("keydown",e=>{if(e.key==="Enter")ask();});
  row.append(inp,send);chat.append(row);v.append(chat);
  v.append(el("div","note box","この相談は社長専用で、従業員・経理・社外の誰にも表示されません。記録は社長のお手元にのみ残ります。AIは寄り添いと事実の整理まで（医療・心理の専門的な診断ではありません）。送信・確定は人。"));
  v.append(footer());
  return v;
}

function viewMail(){
  const v=el("div","view");
  v.innerHTML=`<div class="page-head"><h1>メール</h1><p>AIが返信を下書き。アプリの中で確認して、そのまま送信。わざわざメールアプリに飛ぶ必要はありません。</p></div>`;
  v.append(el("div","note box","AIは返信の“下書き”まで。送信ボタンを押すのは社長です（AIが勝手に送ることはありません）。表示はサンプル（架空）です。"));
  const cbtn=el("button","btn btn-green btn-sm","✏️ 新規メール作成");cbtn.style.marginTop="14px";cbtn.onclick=composeMail;v.append(cbtn);
  const two=el("div");two.style.cssText="display:grid;grid-template-columns:300px 1fr;gap:18px;margin-top:16px;align-items:start";
  const list=el("div","card");list.style.cssText="padding:8px";
  const detail=el("div","card");detail.style.cssText="padding:20px 22px";
  two.append(list,detail);v.append(two);
  function updateList(){
    list.innerHTML="";
    MAILS.forEach((m,i)=>{
      const it=el("div");it.style.cssText="padding:12px 13px;border-radius:11px;cursor:pointer;border-bottom:1px solid var(--line);"+(i===mailSel?"background:var(--green-soft);":"");
      const dot=m.sent?"var(--muted)":(m.unread?"var(--amber)":"transparent");
      it.innerHTML=`<div style="display:flex;align-items:center;gap:7px"><span style="width:8px;height:8px;border-radius:50%;background:${dot};flex:0 0 8px"></span><span style="font-size:13px;font-weight:${m.unread?"800":"700"};color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.from}</span><span style="font-size:10.5px;color:var(--muted)">${m.time}</span></div><div style="font-size:12.5px;font-weight:700;margin-top:4px;color:var(--ink)">${m.sent?'<span style="color:var(--green)">✓返信済 </span>':""}${m.subj}</div><div style="font-size:11.5px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.body}</div>`;
      it.onclick=()=>{mailSel=i;m.unread=false;updateList();buildDetail();};
      list.append(it);
    });
  }
  function buildDetail(){
    const m=MAILS[mailSel];detail.innerHTML="";
    const h=el("div");h.style.cssText="border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px";

function buildNav(){
  const nav=$("#nav");nav.innerHTML="";
  const mkItem=(n)=>{
    const b=el("button","nav-item"+(n.opt?" opt":"")+(STATE.view===n.id?" active":""));
    const star=n.opt?`<span class="ni-star" aria-hidden="true">${STAR_MINI}</span>`:"";
    const badge=n.badge?`<span class="badge">${n.badge}</span>`:"";
    b.innerHTML=`<span class="ic">${n.ic}</span><span class="ni-label">${n.label}</span>${star}${badge}`;
    b.setAttribute("aria-current",STATE.view===n.id?"page":"false");
    b.onclick=()=>{go(n.id);};
    return b;
  };
  if(STATE.role==="employee"){
    nav.appendChild(el("div","nav-sec","従業員メニュー"));
    EMP_NAV.forEach(n=>nav.appendChild(mkItem(n)));
  } else {
    var NAV_GROUPS=[
      ["はじめに",["banto","team","dashboard"]],
      ["お金",["shushi","keihi","seikyu","shikin","sakugen","hojokin"]],
      ["人と現場",["shift","nippo","tasks"]],
      ["営業・集客",["eigyo","mail"]],
      ["経営",["weekly","teiki","bunseki","soudan","kioku"]],
      ["導入・設定",["sim","donyu","shorui","tsuchi"]]
    ];
    var byId={};NAV.forEach(function(n){byId[n.id]=n;});var used={};
    NAV_GROUPS.forEach(function(g){nav.appendChild(el("div","nav-sec",g[0]));g[1].forEach(function(id){if(byId[id]){nav.appendChild(mkItem(byId[id]));used[id]=1;}});});
    var rest=NAV.filter(function(n){return n.sec==="main"&&!used[n.id];});
    if(rest.length){nav.appendChild(el("div","nav-sec","その他"));rest.forEach(function(n){nav.appendChild(mkItem(n));});}
    nav.appendChild(el("div","nav-sec opt","オプション"));
    NAV.filter(n=>n.sec==="opt").forEach(n=>nav.appendChild(mkItem(n)));
  }
  // sb-foot（ログイン中の役職＋切り替え）
  const foot=$("#sbFoot");
  if(foot){
    foot.style.display="block";
    foot.innerHTML="";
    const row=el("div");row.style.cssText="display:flex;align-items:center;gap:13px;margin-bottom:10px";
    if(STATE.role==="employee"){
      row.innerHTML=`<div class="av" style="background:linear-gradient(150deg,#5a8f6f,#3f7a57)">佐</div><div class="who"><b>佐藤さん</b><span>従業員でログイン中</span></div>`;
    } else {
      row.innerHTML=`<div class="av">社</div><div class="who"><b>社長</b><span>管理者でログイン中</span></div>`;
    }
    foot.appendChild(row);
    const sw=el("button");
    sw.style.cssText="width:100%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#dde9e0;border-radius:9px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s";
    sw.onmouseenter=()=>sw.style.background="rgba(255,255,255,.16)";
    sw.onmouseleave=()=>sw.style.background="rgba(255,255,255,.08)";
    if(STATE.role==="employee"){ sw.textContent="🔒 管理者に切り替え"; sw.onclick=requestAdmin; }

  tasks:{what:"会社のタスクをAIが期日・優先順位・担当で整理。『今これをやるべき』を自分から提案します。",points:["大きなプロジェクトから細かい連絡まで一元管理","期日・優先度・ボールの持ち主を自動で判断","今日やるべきことを先回りで提案","付箋に頼らず、抜け漏れを防ぐ"]},
  nippo:{what:"6人分の日報を毎日1枚に要約。提出漏れが赤で即わかります。さらに職場の“傾向”もAIが分析します。",points:["提出マトリクスで未提出がひと目","AIが日報を毎日要約","日報トレンド分析＝増えた言及ワード・気になる傾向を炙り出す（個人攻撃でなく傾向）","集計は社内のAI・外部送信なし。最終判断は社長"]},
  shift:{what:"全員の希望からシフトを調整。人員不足や無理な連勤を避けた勤務表づくりを助けます。",points:["従業員がスマホからシフト希望を提出","希望を集めて勤務表の原案を作成","人員不足・連勤・休憩割れを警告","確定は必ず責任者（社長）の承認"]},
  shushi:{what:"売掛・買掛、入ってくるお金・出ていくお金を1画面に。会社の利益と資金の状態が分かります。",points:["売上・経費・粗利を月次で集計","売掛金・買掛金の残高を管理","キャッシュフローの見通しを表示","気になる増減はAIが指摘"]},
  seikyu:{what:"請求書づくりと入金チェックを自動化。未入金を見つけて督促文の下書きまで用意します。",points:["請求書をワンクリックで作成","入金を自動で照合（消し込み）","未入金・期日超過を一覧で警告","督促文の下書きを用意（送信は社長）"]},
  shikin:{what:"これから入るお金・出るお金をカレンダーで。資金がショートしそうな日を前もって警告します。",points:["入金予定・支払予定をカレンダーで可視化","月末の見込み残高を自動計算","資金ショートの恐れを事前にアラート","直近の予定を一覧で確認"]},
  shorui:{what:"AIが作った請求書・見積書・給与明細などを、その場でプレビュー確認できます。",points:["書類の種類を切り替えてプレビュー","内容を確認してPDFダウンロード","適格請求書（インボイス）の形式に対応","送付・確定は社長が行う"]},
  sakugen:{what:"AI社員によって削減できた作業時間とお金を“見える化”。導入効果がひと目で分かります。",points:["今月の削減時間・削減額を表示","業務別の内訳を集計","6ヶ月の推移をグラフで","※数値は試算・前提により変動"]},
  hojokin:{what:"会社に使えそうな補助金をAIが探してお知らせ。事業計画書のたたき台づくりまで助けます。",points:["公募が出るたび会社の事業内容と照合","使える補助金だけを抽出して通知","事業計画書のたたき台を下書き","※採択は保証しません。申請・提出は社長本人"]},
  kioku:{what:"社長の好み・判断基準・合言葉を覚えて、使うほど先回りするAIの“記憶ノート”です。",points:["社長の手直しや判断のクセを記録","次回から社長の段取り・口調で先回り","会社専用なので他社には真似できない","※脳を読むのではなく“好みのメモ”を貯める仕組み"]},
  tsuchi:{what:"日報・未入金・シフト・補助金などの“動き”を、いつものチャットへ自動でお知らせします。",points:["Chatwork・LINE WORKS・Slack・Discord・LINE・メールに対応","『何かあるたび』に自動通知（ルールは選べる）","補助金の新着・ダッシュボードの異常も通知","ログインしなくても会社が回る"]}
};
function featInfoBox(id){
  const f=FEATURE_INFO[id]; if(!f) return null;
  const d=el("div","card");d.style.cssText="margin:0 0 18px;background:var(--green-soft2);border:1px solid var(--line);border-left:4px solid var(--green);padding:0;overflow:hidden";
  const head=el("button");head.style.cssText="width:100%;display:flex;gap:10px;align-items:center;background:none;border:none;cursor:pointer;padding:11px 16px;text-align:left;font-family:inherit";
  head.innerHTML='<span style="flex:0 0 19px;width:19px;height:19px;color:var(--green)">'+I.ai+'</span><span style="flex:1;font-weight:800;color:#14512a;font-size:13.5px">この機能でできること</span><span class="fi-cv" style="font-size:12px;color:var(--green);font-weight:700;white-space:nowrap">詳しく ▾</span>';
  const bodyd=el("div");bodyd.style.cssText="display:none;padding:2px 16px 14px 45px";
  var pts=f.points.map(function(p){return '<li style="margin:5px 0">'+p+'</li>';}).join("");
  bodyd.innerHTML='<div style="font-size:13px;line-height:1.8;margin-bottom:8px">'+f.what+'</div><ul style="margin:0;padding-left:20px;font-size:12.8px;line-height:1.7;color:var(--ink)">'+pts+'</ul>';
  head.onclick=function(){var open=bodyd.style.display==="none";bodyd.style.display=open?"block":"none";var cv=head.querySelector(".fi-cv");if(cv)cv.textContent=open?"閉じる ▴":"詳しく ▾";};
  d.append(head,bodyd);
  return d;
}
function render(){
  const wrap=$("#viewwrap");
  wrap.innerHTML="";
  const builder=VIEWS[STATE.view]||viewDashboard;
  const view=builder();
  view.classList.add("active");
  wrap.appendChild(view);
  // ★各メイン機能に「詳しい説明」をpage-head直下へ自動挿入
  const ib=featInfoBox(STATE.view); const ph=view.querySelector(".page-head");
  if(ib && ph){ ph.insertAdjacentElement("afterend", ib); }
  const nv=NAV.find(n=>n.id===STATE.view)||EMP_NAV.find(n=>n.id===STATE.view);
  $("#tbTitle").textContent=nv?nv.label:"";
  // wire any data-go (kpi cards / links)
  $$("[data-go]",wrap).forEach(elm=>{
    elm.style.cursor="pointer";
    elm.addEventListener("click",e=>{e.stopPropagation();go(elm.dataset.go);});
  });
}

// hamburger
$("#hb").onclick=()=>document.body.classList.toggle("nav-open");
$("#scrim").onclick=()=>document.body.classList.remove("nav-open");

buildNav();
render();
</script>

<!-- ★あったらいいな機能：どの画面からでも使える「AIに頼む（合言葉）」＋朝のブリーフィング（自己完結・既存コード非干渉） -->
<style>
.aiq-fab{position:fixed;right:22px;bottom:22px;z-index:115;display:flex;align-items:center;gap:10px;
 background:linear-gradient(135deg,var(--green-bright,#2c8f4d),var(--green,#1f6b3a));color:#fff;border:none;
 border-radius:30px;padding:13px 20px;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:14px;
 box-shadow:0 10px 26px rgba(20,81,42,.34),inset 0 1px 0 rgba(255,255,255,.28);cursor:pointer;transition:transform .15s var(--ease,ease),box-shadow .15s;}

.aiq-ov{position:fixed;inset:0;z-index:130;background:rgba(14,30,20,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
 display:flex;align-items:flex-start;justify-content:center;padding:7vh 18px 30px;opacity:0;pointer-events:none;transition:opacity .24s var(--ease,ease);overflow-y:auto;}

 transform:translateY(16px) scale(.99);opacity:.6;transition:transform .28s var(--ease,ease),opacity .24s;overflow:hidden;margin:auto 0;}

.aiq-h .tt{flex:1;min-width:0;} .aiq-h .tt b{font-size:15.5px;font-weight:700;display:block;} .aiq-h .tt span{font-size:11.5px;color:#cfe6d6;}
.aiq-x{width:32px;height:32px;border-radius:9px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:17px;cursor:pointer;flex:0 0 32px;transition:.15s;}

.aiq-card{border:1px solid var(--green-soft,#cfe3d4);background:linear-gradient(180deg,#f3f9f4,#fff);border-radius:14px;padding:16px 18px;animation:aiqUp .3s var(--ease,ease);}
@keyframes aiqUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.aiq-card .rh{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--green,#1f6b3a);font-size:14px;margin-bottom:8px;}
.aiq-card .rb{font-size:13px;color:#3c443c;line-height:1.7;}

.aiq-cta{margin-top:13px;border:none;border-radius:10px;padding:10px 16px;background:linear-gradient(135deg,#d08e1f,#a96a10);color:#fff;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(160,103,16,.26);}
.aiq-note{font-size:10.5px;color:var(--muted,#6e7872);margin-top:12px;line-height:1.6;}
</style>
<button id="aiqFab" class="aiq-fab" aria-label="AIに頼む"><span class="pls"></span>AIに頼む</button>
<div id="aiqOv" class="aiq-ov" role="dialog" aria-modal="true" aria-hidden="true"><div class="aiq-panel">
  <div class="aiq-h"><div class="ic">🟢</div><div class="tt"><b>AIに頼む（合言葉）</b><span>話しかけるだけ。どの画面からでも使えます</span></div><button class="aiq-x" id="aiqClose" aria-label="閉じる">×</button></div>
  <div class="aiq-body">
    <div class="aiq-inrow"><input id="aiqInp" class="aiq-in" placeholder="例：未入金チェックして / 今月の請求書つくって"><button id="aiqGo" class="aiq-send">頼む</button></div>
    <div class="aiq-lbl">よく使う合言葉</div>
    <div class="aiq-chips" id="aiqChips"></div>
    <div class="aiq-res" id="aiqRes"></div>
    <div class="aiq-note">※デモのサンプルです。AIは下書き・案・通知まで。送信・支払い・確定は必ず社長が行います。</div>
  </div>
</div></div>
<script>
(function(){
  var ov=document.getElementById('aiqOv'),fab=document.getElementById('aiqFab'),res=document.getElementById('aiqRes'),inp=document.getElementById('aiqInp');
  function open(){ov.classList.add('open');ov.setAttribute('aria-hidden','false');setTimeout(function(){if(inp)inp.focus();},90);}
  function close(){ov.classList.remove('open');ov.setAttribute('aria-hidden','true');}
  fab.addEventListener('click',open);
  document.getElementById('aiqClose').addEventListener('click',close);
  ov.addEventListener('mousedown',function(e){if(e.target===ov)close();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&ov.classList.contains('open'))close();});
  function toastMsg(m){var w=document.getElementById('toastWrap');if(!w){w=document.createElement('div');w.id='toastWrap';w.style.cssText='position:fixed;right:20px;bottom:90px;z-index:140;display:flex;flex-direction:column;gap:8px';document.body.appendChild(w);}var t=document.createElement('div');t.textContent=m;t.style.cssText='background:#14512a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:0 6px 18px rgba(0,0,0,.25);animation:aiqUp .25s ease';w.appendChild(t);setTimeout(function(){t.remove();},2600);}
  function navTo(label){var bs=Array.prototype.slice.call(document.querySelectorAll('nav button'));var b=bs.find(function(x){return x.textContent.replace(/\s+/g,'').indexOf(label)>=0;});if(b){b.click();return true;}return false;}
  var CMDS=[
    {k:'☀️ 朝のブリーフィング',type:'brief'},
    {k:'💰 未入金チェック',nav:'請求',r:'未入金は <b>2件・¥162,000</b> です。丁寧な督促文の下書きを用意しました（送信は承認後）。',cta:'請求・入金を開く'},
    {k:'🧾 今月の請求書をつくる',nav:'請求',r:'請求書 <b>5件</b> を下書きしました（インボイス対応）。最終承認だけお願いします。',cta:'請求・入金を開く'},
    {k:'📒 経費の仕分け',nav:'収支',r:'カード明細 <b>32件</b> を自動で科目仕分けしました（要確認 3件）。',cta:'収支・月次を開く'},
    {k:'🗓 シフト希望を集計',nav:'シフト',r:'<b>6名中6名</b> が提出済み。最適なシフト案を作成できます。',cta:'シフトを開く'},
    {k:'🎁 補助金をチェック',nav:'補助金',r:'新着 <b>1件</b>：IT導入補助金2026（マッチ度95%）。書類のたたき台まで用意できます。',cta:'補助金を開く'},
    {k:'✅ 今日のタスク',nav:'タスク',r:'今日のタスクは <b>10件中7件</b> 完了。承認待ちが 2件 あります。',cta:'タスクを開く'},
    {k:'📞 今日フォローすべき案件',type:'follow',nav:'案件',cta:'案件・アポ管理を開く'}
  ];
  function card(html){res.innerHTML='';var d=document.createElement('div');d.className='aiq-card';d.innerHTML=html;res.appendChild(d);return d;}
  function showCmd(c){var d=card('<div class="rh">'+c.k+'</div><div class="rb">'+c.r+'</div>');if(c.cta&&c.nav){var b=document.createElement('button');b.className='aiq-cta';b.textContent=c.cta+' →';b.onclick=function(){close();navTo(c.nav);toastMsg(c.cta+'へ移動しました');};d.appendChild(b);}}
  function showBrief(){card('<div class="rh">☀️ 今日の要点（おはようございます）</div><ul>'+
    '<li>💰 未入金 <b>2件・¥162,000</b></li>'+
    '<li>✉️ 要返信メール <b>3件</b>（返信の下書き用意済み）</li>'+
    '<li>✅ 今日のタスク <b>7/10</b> 完了（承認待ち2）</li>'+
    '<li>🗓 シフト未提出 <b>1名</b>（リマインド送信済み）</li>'+
    '<li>🎁 補助金 新着 <b>1件</b>（IT導入補助金2026）</li>'+
    '</ul><div style="font-size:11px;color:#6e7872;margin-top:9px">この1枚を毎朝お届けします（デモ・サンプル）。</div>');}
  function showFollow(c){
    var list=(typeof eigyoFollowList==='function')?eigyoFollowList():[];
    var body;
    if(list.length){
      var items=list.map(function(d){return '<li><b>'+d.name+'</b>（'+d.gyo+'・確度'+d.prob+'%・最終接触 '+d.last+'）</li>';}).join('');
      body='5日以上 連絡できていない案件が <b>'+list.length+'件</b> あります。<ul style="margin:8px 0 0;padding-left:18px;line-height:1.9">'+items+'</ul><div style="font-size:11px;color:#6e7872;margin-top:9px">各案件はAIがフォロー文の下書きを用意できます（送信は社長が確認）。</div>';
    } else { body='いまフォローが必要な案件はありません。よく追えています。'; }
    var d=card('<div class="rh">'+c.k+'</div><div class="rb">'+body+'</div>');
    if(c.cta&&c.nav){var b=document.createElement('button');b.className='aiq-cta';b.textContent=c.cta+' →';b.onclick=function(){close();navTo(c.nav);toastMsg(c.cta+'へ移動しました');};d.appendChild(b);}
  }
  function run(text){var t=(text||'').trim();if(!t)return;
    var hit=CMDS.find(function(c){var key=c.k.replace(/^[^ ]+ /,'');return t.indexOf(key)>=0||(c.nav&&t.indexOf(c.nav)>=0);});
    if(/フォロー|追客|未接触/.test(t)&&!hit)hit=CMDS.find(function(c){return c.type==='follow';});
    if(/ブリーフ|今日|朝|まとめ/.test(t)&&!hit)hit=CMDS[0];
    if(hit){ if(hit.type==='brief')showBrief(); else if(hit.type==='follow')showFollow(hit); else showCmd(hit); }
    else { card('<div class="rh">🟢 承知しました</div><div class="rb">「'+t.replace(/</g,'&lt;')+'」を確認し、下書き・候補を用意します（デモ）。実行・送信は社長の承認後です。</div>'); }
  }
  var chips=document.getElementById('aiqChips');
  CMDS.forEach(function(c){var b=document.createElement('button');b.className='aiq-chip';b.textContent=c.k;b.onclick=function(){run(c.type==='brief'?'朝のブリーフィング':c.k);};chips.appendChild(b);});
  document.getElementById('aiqGo').onclick=function(){run(inp.value);};
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')run(inp.value);});
})();
</script>
